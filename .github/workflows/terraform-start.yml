name: Terraform Start Application

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy (dev, staging, prod)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
      enable_api_ingress_https:
        description: 'HTTPS na API via Ingress NGINX + Let''s Encrypt (requer secret LETSENCRYPT_ACME_EMAIL)'
        required: false
        default: false
        type: boolean

jobs:
  terraform-start:
    name: Deploy Application to AKS
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get Azure Resources Information
        id: azure-info
        run: |
          RESOURCE_GROUP="medinventory-rg"
          ENVIRONMENT="${{ inputs.environment }}"
          
          ACR_NAME="medinventoryacr${ENVIRONMENT}"
          AKS_NAME="medinventory-aks-${ENVIRONMENT}"
          
          echo "Looking for resources in: $RESOURCE_GROUP"
          echo "  - ACR: $ACR_NAME"
          echo "  - AKS: $AKS_NAME"
          
          # Verify ACR exists
          if ! az acr show --name $ACR_NAME --resource-group $RESOURCE_GROUP &> /dev/null; then
            echo "ERROR: ACR '$ACR_NAME' not found"
            echo "Please run 'Terraform Create Infrastructure' workflow first"
            exit 1
          fi

          # Verify AKS exists
          if ! az aks show --name $AKS_NAME --resource-group $RESOURCE_GROUP &> /dev/null; then
            echo "ERROR: AKS cluster '$AKS_NAME' not found"
            echo "Please run 'Terraform Create Infrastructure' workflow first"
            exit 1
          fi
          
          ACR_LOGIN_SERVER=$(az acr show --name $ACR_NAME --resource-group $RESOURCE_GROUP --query "loginServer" -o tsv)
          
          echo "resource_group=$RESOURCE_GROUP" >> $GITHUB_OUTPUT
          echo "acr_name=$ACR_NAME" >> $GITHUB_OUTPUT
          echo "acr_login_server=$ACR_LOGIN_SERVER" >> $GITHUB_OUTPUT
          echo "aks_name=$AKS_NAME" >> $GITHUB_OUTPUT
          
          echo "Resource Group: $RESOURCE_GROUP"
          echo "ACR: $ACR_NAME"
          echo "AKS: $AKS_NAME"

      - name: Verify Docker Image Exists in ACR
        run: |
          echo "Checking if Docker image exists in ACR..."
          ACR_NAME="${{ steps.azure-info.outputs.acr_name }}"
          
          if az acr repository show --name $ACR_NAME --repository medinventory-api > /dev/null 2>&1; then
            echo "Docker image 'medinventory-api' found in ACR"
            echo ""
            echo "Available tags:"
            az acr repository show-tags --name $ACR_NAME --repository medinventory-api --output table
          else
            echo "ERROR: Docker image 'medinventory-api' not found in ACR"
            echo ""
            echo "Please run the 'Build and Push Docker Image' workflow first!"
            exit 1
          fi

      - name: Extract Azure Credentials (for Terraform)
        run: |
          CLIENT_ID=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r '.clientId')
          CLIENT_SECRET=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r '.clientSecret')
          TENANT_ID=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r '.tenantId')
          SUBSCRIPTION_ID=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r '.subscriptionId')
          
          echo "ARM_CLIENT_ID=$CLIENT_ID" >> $GITHUB_ENV
          echo "ARM_CLIENT_SECRET=$CLIENT_SECRET" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=$TENANT_ID" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=$SUBSCRIPTION_ID" >> $GITHUB_ENV

      - name: Terraform Init
        working-directory: infrastructure/terraform
        run: terraform init -upgrade

      - name: Terraform Plan (enable in-cluster resources)
        working-directory: infrastructure/terraform
        env:
          TF_VAR_letsencrypt_acme_email: ${{ secrets.LETSENCRYPT_ACME_EMAIL }}
        run: |
          terraform plan -refresh=false \
            -var="sp_object_id=${{ secrets.SP_OBJECT_ID }}" \
            -var="environment=${{ inputs.environment }}" \
            -var="enable_k8s_resources=true" \
            -var="enable_api_ingress_https=${{ inputs.enable_api_ingress_https }}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: infrastructure/terraform
        env:
          TF_VAR_letsencrypt_acme_email: ${{ secrets.LETSENCRYPT_ACME_EMAIL }}
        run: terraform apply -auto-approve tfplan

      - name: Show Outputs
        working-directory: infrastructure/terraform
        run: terraform output

      - name: Health Check
        continue-on-error: true
        id: health-check
        run: |
          echo "Health check is skipped here because the AKS Service external IP can take time to provision."
          echo "Use Terraform output 'api_load_balancer_ip' or kubectl to check the service once assigned."
          exit 0
          

      - name: Summary
        if: always()
        run: |
          echo "## Application Deployment Triggered (AKS)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Resource Group:** ${{ steps.azure-info.outputs.resource_group }}" >> $GITHUB_STEP_SUMMARY
          echo "**AKS:** ${{ steps.azure-info.outputs.aks_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**ACR:** ${{ steps.azure-info.outputs.acr_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Note:" >> $GITHUB_STEP_SUMMARY
          echo "This workflow applies Kubernetes resources via Terraform (enable_k8s_resources=true)." >> $GITHUB_STEP_SUMMARY
          echo "To update the image, run the **Build and Push Docker Image** workflow first." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**HTTPS (Ingress):** If you enabled \`enable_api_ingress_https\`, check outputs \`api_https_base_url\` and \`api_ingress_load_balancer_ip\`. Configure the frontend \`REACT_APP_API_URL\` to \`api_https_base_url\` (HTTPS)." >> $GITHUB_STEP_SUMMARY
